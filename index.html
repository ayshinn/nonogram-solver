<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browser-based nonogram puzzle player and solver. Enter hints, play manually, or let the solver fill it in."
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Nonogram Solver</title>
  </head>
  <body>
    <header class="site-header">
      <h1>Nonogram Solver</h1>
      <p class="site-tagline">
        Enter hints manually or import a puzzle screenshot, then play or solve.
      </p>
    </header>

    <main class="site-main">
      <section class="controls" aria-label="Puzzle setup">
        <div class="controls-row">
          <label class="field field--inline">
            <span class="field-label">Grid size (5&ndash;25)</span>
            <input type="number" id="gridSize" min="5" max="25" value="5" />
          </label>
          <label class="field field--inline">
            <span class="field-label">Puzzle screenshot (PNG/JPG)</span>
            <input
              type="file"
              id="imageFile"
              accept="image/png,image/jpeg"
            />
          </label>
        </div>

        <button
          type="button"
          id="manualInputBtn"
          class="btn btn--toggle"
          aria-expanded="false"
          aria-controls="manualHints"
        >
          <span class="btn-toggle-chevron" aria-hidden="true">&#9656;</span>
          Manual Input
        </button>

        <div id="manualHints" class="controls-hints" hidden>
          <label class="field">
            <span class="field-label"
              >Row hints &mdash; one row per line, numbers separated by
              commas</span
            >
            <textarea
              id="rowHints"
              rows="6"
              spellcheck="false"
              placeholder="e.g.&#10;1&#10;3&#10;5&#10;3,1&#10;3"
            ></textarea>
            <p
              id="rowHintsWarning"
              class="field-warning"
              hidden
              aria-live="polite"
            ></p>
          </label>
          <label class="field">
            <span class="field-label"
              >Column hints &mdash; one column per line</span
            >
            <textarea
              id="colHints"
              rows="6"
              spellcheck="false"
              placeholder="e.g.&#10;2&#10;4&#10;5&#10;2,1&#10;2"
            ></textarea>
            <p
              id="colHintsWarning"
              class="field-warning"
              hidden
              aria-live="polite"
            ></p>
          </label>
        </div>

        <div class="controls-buttons">
          <button type="button" id="initializeBtn" class="btn btn--primary">
            Initialize
          </button>
          <button type="button" id="solveBtn" class="btn">Solve</button>
          <button type="button" id="clearBtn" class="btn">Clear Board</button>
          <button type="button" id="resetBtn" class="btn btn--ghost">
            Reset
          </button>
        </div>
      </section>

      <section class="board-area" aria-label="Puzzle board">
        <div
          id="solvePlayerBar"
          class="solve-player-bar"
          role="toolbar"
          aria-label="Solver animation controls"
          hidden
        >
          <label class="solve-player-speed">
            <span class="solve-player-speed-label">Speed</span>
            <input
              type="range"
              id="solveSpeed"
              min="5"
              max="500"
              step="5"
              value="300"
              aria-label="Animation delay in milliseconds"
            />
            <span id="solveSpeedValue" class="solve-player-speed-value"
              >300&nbsp;ms</span
            >
          </label>
          <span id="solveStepCounter" class="solve-player-counter">Step 0 / 0</span>
          <div class="solve-player-buttons">
            <button type="button" id="solvePauseBtn" class="btn">Pause</button>
            <button type="button" id="solveStopBtn" class="btn">Stop</button>
          </div>
        </div>
        <div id="board-root" class="board"></div>
      </section>
    </main>

    <dialog id="solveModal" class="solve-modal" aria-labelledby="solveModalTitle">
      <form method="dialog" class="solve-modal-form">
        <h2 id="solveModalTitle" class="solve-modal-title">Solve the puzzle</h2>
        <p class="solve-modal-body">
          Solve it right away, or watch the solver work step by step — each cell
          change is animated and you can adjust speed on the fly.
        </p>
        <div class="solve-modal-actions">
          <button
            type="button"
            id="solveModalInstantBtn"
            class="btn btn--primary"
          >
            Solve now
          </button>
          <button type="button" id="solveModalWatchBtn" class="btn">
            Watch it solve
          </button>
          <button
            type="button"
            id="solveModalCancelBtn"
            class="btn btn--ghost"
          >
            Cancel
          </button>
        </div>
      </form>
    </dialog>

    <div id="statusBar" class="status" role="status" aria-live="polite"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
